
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Campanha</title>
<style>
    :root { --primary: #007bff; --border: #ccc; }
    body { font-family: sans-serif; padding: 20px; background: #f4f4f9; color: #333; }
    .shell { max-width: 1000px; margin: auto; }
    .card { background: white; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .field { display: flex; flex-direction: column; }
    input, select, textarea { padding: 8px; margin-top: 5px; border: 1px solid var(--border); border-radius: 4px; }
    .btn { padding: 10px 15px; cursor: pointer; border-radius: 4px; border: 1px solid var(--border); }
    .btn-primary { background: var(--primary); color: white; }
    .line-item { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    .hidden { display: none; }
    /* Multi-select styling to keep them clean */
    .multi-select { border: 1px solid var(--border); border-radius: 4px; padding: 5px; background: #fff; max-height: 150px; overflow-y: auto; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="shell">
    <div class="card">
        <h2>Informações Gerais</h2>
        <form id="campaignForm" class="grid">
            <div class="field"><label>Número de RP</label><input type="number" id="rp" required></div>
            <div class="field"><label>Afiliadas</label><select id="aff" required></select></div>
            <div class="field"><label>Order ID</label><input type="number" id="oid" required></div>
            <div class="field"><label>Cliente</label><input type="text" id="cli" required></div>
            <div class="field"><label>Agencia</label><input type="text" id="age"></div>
            <div class="field"><label>Mês/Ano</label><div style="display:flex;gap:5px"><select id="mes"></select><input type="number" id="ano"></div></div>
        </form>
    </div>
    <div class="card">
        <h2>Line Items</h2>
        <div id="lines"></div>
        <button class="btn" onclick="addLine()">+ Nova Linha</button>
        <button class="btn btn-primary" onclick="downloadExcel()">Baixar Excel</button>
    </div>
</div>
<script>
    // Simplified logic to ensure stability
    async function loadData() {
        try {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjRYT6xv7g-svK5_ScKZitolkns29Bbls5xAcMs8NONGY-p5xFa9Yz3tRJIwuhWOm4_FEY6vV0Ig1Z/pub?output=xlsx';
            const res = await fetch(url);
            const buf = await res.arrayBuffer();
            const wb = XLSX.read(buf, {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            // Populate selects with data[0] as header and column 0 for afiliadas
            const select = document.getElementById('aff');
            data.slice(1).forEach(r => { if(r[0]) select.innerHTML += `<option>${r[0]}</option>`; });
        } catch(e) { console.error(e); }
    }
    function addLine() {
        const div = document.createElement('div');
        div.className = 'line-item';
        div.innerHTML = `
            <div class="grid">
                <div class="field"><label>Propriedades</label><select></select></div>
                <div class="field"><label>Formato</label><select></select></div>
                <div class="field"><label>Data</label><input type="date"></div>
            </div>
            <button onclick="this.parentElement.remove()">Remover</button>
        `;
        document.getElementById('lines').appendChild(div);
    }
    loadData();
</script>
</body>
</html>
