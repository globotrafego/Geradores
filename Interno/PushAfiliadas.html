<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <!-- 1. Tell search engines where the actual content lives -->

    <!-- 2. Perform the instant meta refresh redirect -->
    <meta http-equiv="refresh" content="0; URL=https://script.google.com/macros/s/AKfycbyAny_a7W2vaBLApAFmGgU0EjQ3mps-M9vatC3hOyQms8FwMvpx5i5kinHhsyDk1yB4/exec">
</head>
<body>
    <!-- 3. JavaScript fallback if meta refresh fails -->
    <script>
        window.location.replace("https://script.google.com/macros/s/AKfycbyAny_a7W2vaBLApAFmGgU0EjQ3mps-M9vatC3hOyQms8FwMvpx5i5kinHhsyDk1yB4/exec");
    </script>

    <!-- 4. Manual link for users with both disabled -->
    <h1>Redirecting...</h1>
    <p>If you are not redirected automatically, <a href="https://script.google.com/macros/s/AKfycbyAny_a7W2vaBLApAFmGgU0EjQ3mps-M9vatC3hOyQms8FwMvpx5i5kinHhsyDk1yB4/exec">click here</a>.</p>
