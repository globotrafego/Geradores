<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="ad-validator-tool" content="true">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Tag Validator Pro</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="extension-banner" style="display:none; background: var(--success); color: white; padding: 0.5rem; text-align: center; font-weight: bold; font-size: 0.9rem;">
    ✨ Helper Extension Connected! You will get 100% exact network weights.
  </div>

  <div class="app-container">
    <header class="header">
      <h1>Ad Tag Validator</h1>
      <p>Bulk validate IAB dimensions, macros, click URLs, and loaded weight.</p>
    </header>

    <main>
      <div class="dropzone" id="dropzone">
        <svg class="dropzone-icon" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <h3 class="dropzone-title">Drop ad tags here</h3>
        <p class="dropzone-subtitle">or click to browse (.txt or .html files).</p>
        <input type="file" id="fileInput" multiple accept=".txt,.html,text/plain,text/html" style="display: none;">
      </div>

      <div class="results-container" id="resultsContainer">
        <div class="results-header">
          <h2>Validation Results (<span id="resultsCount">0</span>)</h2>
          <div style="display: flex; gap: 1rem;">
            <button class="btn btn-primary" id="btnExport">Export CSV</button>
            <button class="btn" id="btnClear">Clear</button>
          </div>
        </div>
        <div class="grid" id="resultsGrid"></div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
