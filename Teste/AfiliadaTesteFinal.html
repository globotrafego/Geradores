<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Campanhas - Afiliadas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.3);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --shadow-color: rgba(15, 23, 42, 0.08);
            --item-bg: rgba(241, 245, 249, 0.6);
            --glass-blur: blur(12px);
        }

        body.dark-theme {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.75);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
            --input-border: #475569;
            --danger: #f87171;
            --danger-hover: #ef4444;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --item-bg: rgba(15, 23, 42, 0.5);
            --glass-blur: blur(16px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%);
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-title {
            font-size: 2.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(99, 102, 241, 0.1);
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: var(--glass-blur);
            font-size: 1.25rem;
            color: var(--text-main);
        }
        .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px var(--shadow-color);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow-color);
            backdrop-filter: var(--glass-blur);
            padding: 35px;
            margin-bottom: 30px;
        }
        
        #section-geral {
            position: relative;
            z-index: 10;
        }
        
        #section-lines {
            position: relative;
            z-index: 5;
        }
        
        .card h2 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"], input[type="number"], input[type="date"], select {
            padding: 12px 14px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 10px;
            font-size: 0.95rem;
            width: 100%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        input[readonly] {
            background-color: var(--item-bg);
            color: var(--text-muted);
            cursor: not-allowed;
            border-color: transparent;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 4px 6px var(--shadow-color);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px var(--shadow-color);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-hover), var(--primary));
        }
        
        .btn-danger {
            background-color: var(--danger);
            color: white;
        }
        .btn-danger:hover {
            background-color: var(--danger-hover);
        }

        .line-item {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            background: var(--item-bg);
        }

        .line-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .line-item-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
        }

        .line-item-add-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            align-items: center;
        }

        .choices[data-type*="select-one"] .choices__inner {
            padding-bottom: 0px;
        }
        .choices__inner {
            border-radius: 10px !important;
            background-color: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            min-height: 46px;
        }
        .choices.is-focused .choices__inner {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .choices__input {
            color: var(--text-main) !important;
            background-color: transparent !important;
        }
        .choices__list--dropdown {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            backdrop-filter: var(--glass-blur);
            border-radius: 10px;
            margin-top: 5px;
            box-shadow: 0 10px 25px var(--shadow-color);
            z-index: 100;
            overflow: hidden;
        }
        .choices__list--dropdown .choices__item {
            color: var(--text-main) !important;
            padding: 10px 16px;
            font-size: 0.95rem;
        }
        .choices__list--dropdown .choices__item--selectable.is-highlighted {
            background-color: rgba(99, 102, 241, 0.1) !important;
            color: var(--primary) !important;
        }
        body.dark-theme .choices__list--dropdown .choices__item--selectable.is-highlighted {
            background-color: rgba(129, 140, 248, 0.2) !important;
            color: var(--primary) !important;
        }
        .choices__list--multiple .choices__item {
            background-color: var(--primary) !important;
            border: none !important;
            border-radius: 6px !important;
            color: white !important;
            font-weight: 500;
            padding: 4px 8px;
        }
        .choices__list--multiple .choices__item[data-deletable] {
            padding-right: 25px;
        }
        
        .hidden {
            display: none !important;
        }
        
        ::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
        }
        body.dark-theme ::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
        }

        /* Custom Dropdown Actions */
        .custom-dropdown-actions {
            display: flex;
            padding: 10px;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--item-bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .action-btn {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            transition: all 0.2s;
        }
        .action-btn:hover {
            background-color: rgba(99, 102, 241, 0.2);
        }
        .action-btn.danger {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        .action-btn.danger:hover {
            background-color: rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

<div id="loading-overlay" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg-color);">
    <div style="text-align:center;">
        <div style="width:48px;height:48px;border:4px solid var(--border-color);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
        <p style="font-size:1.1rem;color:var(--text-muted);font-weight:500;">Carregando base de dados...</p>
    </div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div class="container">
    <div class="top-bar">
        <h1 class="header-title">Gerador de Campanhas - Afiliadas</h1>
        <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle Dark Mode">
            🌙
        </button>
    </div>

    <div class="card" id="section-geral">
        <h2>Informações Gerais da Campanha</h2>
        <div class="grid">
            <div class="form-group">
                <label>Número de RP *</label>
                <input type="number" id="cg-rp" required>
            </div>
            <div class="form-group">
                <label>Afiliadas *</label>
                <select id="cg-afiliadas" required>
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Order ID *</label>
                <input type="number" id="cg-order-id" required>
            </div>
            <div class="form-group">
                <label>Cliente *</label>
                <input type="text" id="cg-cliente" required>
            </div>
            <div class="form-group">
                <label>Agência / Direto</label>
                <input type="text" id="cg-agencia" placeholder="Direto (padrão)">
            </div>
            <div class="form-group">
                <label>Mês *</label>
                <select id="cg-mes" required>
                    <option value="Jan">Janeiro</option>
                    <option value="Feb">Fevereiro</option>
                    <option value="Mar">Março</option>
                    <option value="Apr">Abril</option>
                    <option value="May">Maio</option>
                    <option value="Jun">Junho</option>
                    <option value="Jul">Julho</option>
                    <option value="Aug">Agosto</option>
                    <option value="Sep">Setembro</option>
                    <option value="Oct">Outubro</option>
                    <option value="Nov">Novembro</option>
                    <option value="Dec">Dezembro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ano *</label>
                <input type="number" id="cg-ano" value="2024" required>
            </div>
        </div>
        <div class="form-group" style="margin-top:24px;">
            <label>Nome da Campanha (Gerado Automático)</label>
            <input type="text" id="cg-nome-campanha" readonly>
        </div>
    </div>

    <div class="card" id="section-lines">
        <div class="actions-bar" style="margin-top:0; margin-bottom:25px;">
            <h2 style="border:none; margin:0; padding:0;">Line Items</h2>
            <button class="btn btn-primary" onclick="addLineItem()">+ Adicionar Linha</button>
        </div>
        <div id="line-items-container"></div>
    </div>
    
    <div class="actions-bar" style="margin-top:0; margin-bottom: 50px;">
        <div></div>
        <button class="btn btn-primary" style="font-size: 1.15rem; padding: 16px 40px;" onclick="exportToExcel()">📄 Gerar Excel</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<script>
    // Theme logic
    const themeBtn = document.getElementById('theme-toggle-btn');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        if (document.body.classList.contains('dark-theme')) {
            themeBtn.textContent = '☀️';
        } else {
            themeBtn.textContent = '🌙';
        }
    });

    const BASE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjRYT6xv7g-svK5_ScKZitolkns29Bbls5xAcMs8NONGY-p5xFa9Yz3tRJIwuhWOm4_FEY6vV0Ig1Z/pub?output=xlsx';

    let dropdownData = {};
    let mappings = {};
    let lineItemCount = 0;
    let choicesInstances = [];
    let displayFormatos = [];
    let videoFormatos = [];

    // Helper: extract non-null values from a column in a sheet
    function getColumn(rows, colIndex) {
        return rows.slice(1).map(r => r[colIndex]).filter(v => v != null && v !== '').map(v => String(v).replace(/\u00AD/g, ''));
    }

    // Helper: build a key→value map from two columns
    function buildMap(rows, keyCol, valCol) {
        const map = {};
        rows.slice(1).forEach(r => {
            if (r[keyCol] != null && r[keyCol] !== '' && r[valCol] != null) {
                map[String(r[keyCol]).replace(/\u00AD/g, '')] = String(r[valCol]).replace(/\u00AD/g, '');
            }
        });
        return map;
    }

    async function loadBaseData() {
        const resp = await fetch(BASE_SHEET_URL);
        const buf = await resp.arrayBuffer();
        const wb = XLSX.read(buf, { type: 'array' });

        // --- Afiliada sheet (each column is an independent list) ---
        const afRows = XLSX.utils.sheet_to_json(wb.Sheets['Afiliada'], { header: 1 });
        dropdownData.afiliadas = getColumn(afRows, 0);        // Col A
        dropdownData.meses = getColumn(afRows, 1);             // Col B (not used for dropdown but available)
        dropdownData.propriedades = getColumn(afRows, 2);      // Col C
        dropdownData.tipoDeLinha = getColumn(afRows, 3);       // Col D
        dropdownData.posicaoVideo = getColumn(afRows, 4);      // Col E
        dropdownData.skip = getColumn(afRows, 5);              // Col F
        dropdownData.posicao = getColumn(afRows, 6);           // Col G
        dropdownData.geolocalizacao = getColumn(afRows, 7);    // Col H
        dropdownData.programarDisponivel = getColumn(afRows, 8); // Col I

        // --- BaseFormatos sheet ---
        const fmtRows = XLSX.utils.sheet_to_json(wb.Sheets['BaseFormatos'], { header: 1 });
        const allFormatoNames = getColumn(fmtRows, 0);
        dropdownData.formatos = allFormatoNames;
        mappings.formatos = buildMap(fmtRows, 0, 1);

        // Derive display vs video format lists
        videoFormatos = allFormatoNames.filter(f => ['DAI', 'Video'].includes(f));
        displayFormatos = allFormatoNames.filter(f => !['DAI', 'Video'].includes(f));

        // --- BaseSegmentacoes sheet ---
        const segRows = XLSX.utils.sheet_to_json(wb.Sheets['BaseSegmentacoes'], { header: 1 });
        dropdownData.idades = getColumn(segRows, 0);           // Col A
        mappings.idade_permutive = buildMap(segRows, 0, 1);    // Col A→B
        mappings.idade_audience = buildMap(segRows, 0, 2);     // Col A→C
        dropdownData.generos = getColumn(segRows, 3);          // Col D
        mappings.genero_permutive = buildMap(segRows, 3, 4);   // Col D→E
        mappings.genero_audience = buildMap(segRows, 3, 5);    // Col D→F
        dropdownData.potencialConsumo = getColumn(segRows, 6); // Col G
        mappings.potencial_permutive = buildMap(segRows, 6, 7);// Col G→H
        mappings.potencial_audience = buildMap(segRows, 6, 8); // Col G→I
        dropdownData.interesses = getColumn(segRows, 9);       // Col J
        mappings.interesse_permutive = buildMap(segRows, 9, 10);// Col J→K
        mappings.interesse_audience = buildMap(segRows, 9, 11); // Col J→L

        // --- Site sheet ---
        const siteRows = XLSX.utils.sheet_to_json(wb.Sheets['Site'], { header: 1 });
        dropdownData.sites = getColumn(siteRows, 0);           // Col A

        console.log('Base data loaded:', { dropdownData, mappings });
    }

    const fieldsWithAll = ['formatos', 'posicao', 'sites', 'geolocalizacao', 'idades', 'generos', 'potencialConsumo', 'interesses'];

    const commonSearchOpts = {
        searchEnabled: true,
        searchResultLimit: 100,
        searchFuzzy: false,
        shouldSort: false,
        fuseOptions: {
            threshold: 0.1,
            ignoreLocation: true
        }
    };

    const formatChoices = (arr) => arr.map(item => ({value: item, label: item}));

    function initDropdownOptions(selectElement, optionsArray, isMultiple = false) {
        optionsArray.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt;
            option.textContent = opt;
            selectElement.appendChild(option);
        });
    }

    function updateCampaignName() {
        const rp = document.getElementById('cg-rp').value || "[RP]";
        const af = document.getElementById('cg-afiliadas').value || "[Afiliada]";
        const order = document.getElementById('cg-order-id').value || "[Order ID]";
        const cliente = document.getElementById('cg-cliente').value || "[Cliente]";
        let agencia = document.getElementById('cg-agencia').value || "Direto";
        const mes = document.getElementById('cg-mes').value;
        const ano = document.getElementById('cg-ano').value.substring(2,4);
        
        const mesAno = mes + ano;
        const result = `${rp}_${af}_${order}_${cliente}_${agencia}_${mesAno}_TVGLOBO`;
        document.getElementById('cg-nome-campanha').value = result;
    }
    const daiSiteMappings = {
        "TV TEM": ["Globo_BAU (TV TEM Bauru)", "Globo_ITP (TV TEM Itapetininga)", "Globo_SJR (TV TEM São José do Rio Preto)", "Globo_SOR (TV TEM Sorocaba)"],
        "EPTV": ["Globo_CAM (EPTV Campinas)", "Globo_RIB (EPTV Ribeirão)", "Globo_SCA (EPTV Central)", "Globo_VAR (EPTV Sul de Minas)"],
        "NSC": ["Globo_BLU (NSC Blumenau)", "Globo_CHA (NSC Chapecó)", "Globo_CRI (NSC Criciúma)", "Globo_JOA (NSC Centro-Oeste)", "Globo_JOI (NSC Joinville)", "Globo_SC1 (NSC Florianópolis)"],
        "RBS": ["Globo_PEL (RBS TV Pelotas)", "Globo_PFO (RBS TV Passo Fundo)", "Globo_RS1 (RBS TV Porto Alegre)"],
        "RPCTV": ["Globo_CAV (RPC Cascavel)", "Globo_CUR (RPC Curitiba)", "Globo_FOZ (RPC Foz do Iguaçu)", "Globo_GAV (RPC Guarapuava)", "Globo_LON (RPC Londrina)", "Globo_MAR (RPC Maringá)", "Globo_PGR (RPC Ponta Grossa)", "Globo_PR3 (RPC Paranavaí)"],
        "INTER TV RJ": ["Globo_CAB (Inter TV Alto Litoral)", "Globo_FLU (Inter TV Planície)", "Globo_FRI (Inter TV Serra+Mar)"],
        "INTER TV MG": ["Globo_FAB (Inter TV dos Vales)", "Globo_MTC (Inter TV Grande Minas)"],
        "INTER TV RN": ["Globo_NA2 (Inter TV Costa Branca)", "Globo_NAT (Inter TV Cabugi)"],
        "TV INTEGRACAO": ["Globo_JF (TV Integração Juiz de Fora)", "Globo_UBE (TV Integração Uberlândia)"],
        "TV LIBERAL": ["Globo_BEL (TV Liberal Belém)"],
        "TV VERDES MARES": ["Globo_CE1 (TV Verdes Mares)"],
        "TV ANHANGUERA": ["Globo_GO01 (TV Anhanguera Goiânia)"],
        "TV MIRANTE": ["Globo_MA1 (TV Mirante São Luís)"],
        "TV AMAZONICA AM": ["Globo_MAN (Rede Amazônica Manaus)"],
        "TV DIARIO": ["Globo_MOC (TV Diário)"],
        "TV MORENA": ["Globo_MS1 (TV Morena Campo Grande)"],
        "TV RIO SUL": ["Globo_RES (TV Rio Sul)"],
        "REDE BAHIA": ["Globo_SAL (TV Bahia)"],
        "TV TRIBUNA": ["Globo_SAN (TV Tribuna)"],
        "TV SERGIPE": ["Globo_SER (TV Sergipe)"],
        "TV GAZETA ES": ["Globo_VIT (TV Gazeta)"]
    };

    function setConditionalRequired(itemId, fieldId, isRequired) {
        const field = document.getElementById(`${fieldId}-${itemId}`);
        if (!field) return;
        if (isRequired) field.setAttribute('required', 'required');
        else field.removeAttribute('required');
    }

    function validateRequiredLineFields() {
        const items = document.querySelectorAll('#line-items-container .line-item');
        for (let index = 0; index < items.length; index++) {
            const itemId = index + 1;
            const checks = [
                { id: `propriedade-${itemId}`, message: `Preencha o campo obrigatório Propriedades na Linha ${itemId}.` },
                { id: `tipoLinha-${itemId}`, message: `Preencha o campo obrigatório Tipo de Linha na Linha ${itemId}.` },
                { id: `formatos-${itemId}`, message: `Selecione ao menos um Formato na Linha ${itemId}.`, isMulti: true },
                { id: `dataInicio-${itemId}`, message: `Preencha Data de Início na Linha ${itemId}.` },
                { id: `dataFim-${itemId}`, message: `Preencha Data Fim na Linha ${itemId}.` },
                { id: `entregaDeterminada-${itemId}`, message: `Preencha Entrega Determinada na Linha ${itemId}.` },
                { id: `valorUnitario-${itemId}`, message: `Preencha Valor Unitário (R$) na Linha ${itemId}.` },
                { id: `desconto-${itemId}`, message: `Preencha Desconto (%) na Linha ${itemId}.` },
                { id: `sites-${itemId}`, message: `Selecione ao menos um Site na Linha ${itemId}.`, isMulti: true }
            ];

            for (const check of checks) {
                const el = document.getElementById(check.id);
                if (!el) continue;
                const hasValue = check.isMulti ? el.selectedOptions.length > 0 : !!String(el.value).trim();
                if (!hasValue) {
                    alert(check.message);
                    el.focus();
                    return false;
                }
            }

            const posVideoGroup = document.getElementById(`fg-posicaoVideo-${itemId}`);
            const skipGroup = document.getElementById(`fg-skip-${itemId}`);
            const posicaoGroup = document.getElementById(`fg-posicao-${itemId}`);
            const posVideo = document.getElementById(`posicaoVideo-${itemId}`);
            const skip = document.getElementById(`skip-${itemId}`);
            const posicao = document.getElementById(`posicao-${itemId}`);

            if (posVideoGroup && !posVideoGroup.classList.contains('hidden') && posVideo && !String(posVideo.value).trim()) {
                alert(`Preencha Posição Vídeo na Linha ${itemId}.`);
                posVideo.focus();
                return false;
            }
            if (skipGroup && !skipGroup.classList.contains('hidden') && skip && !String(skip.value).trim()) {
                alert(`Preencha Skip na Linha ${itemId}.`);
                skip.focus();
                return false;
            }
            if (posicaoGroup && !posicaoGroup.classList.contains('hidden') && posicao && posicao.selectedOptions.length === 0) {
                alert(`Selecione ao menos uma Posição na Linha ${itemId}.`);
                posicao.focus();
                return false;
            }
        }
        return true;
    }

    function updateSitesForDAI(itemId) {
        const choiceSitesObj = choicesInstances.find(c => c.id === `sites-${itemId}`);
        if (!choiceSitesObj || !choiceSitesObj.instance) return;
        
        const formatSelect = document.getElementById(`formatos-${itemId}`);
        if (!formatSelect) return;
        
        const hasDAI = Array.from(formatSelect.selectedOptions || []).map(o => o.value.toUpperCase()).includes('DAI');
        
        if (hasDAI) {
            const afiliada = document.getElementById('cg-afiliadas').value;
            const daiSites = daiSiteMappings[afiliada] || [];
            choiceSitesObj.instance.clearStore();
            choiceSitesObj.instance.setChoices(formatChoices(daiSites), 'value', 'label', true);
        } else {
            const allDaiSites = Object.values(daiSiteMappings).flat();
            const nonDaiSites = dropdownData.sites.filter(site => !allDaiSites.includes(site));
            choiceSitesObj.instance.clearStore();
            choiceSitesObj.instance.setChoices(formatChoices(nonDaiSites), 'value', 'label', true);
        }
    }

        new Choices(document.getElementById('cg-mes'), { searchEnabled: false, itemSelectText: '', shouldSort: false });

    function selectAll(field, itemId) {
        const choiceObj = choicesInstances.find(c => c.id === `${field}-${itemId}`);
        if (choiceObj) {
            let available = [];
            if (field === 'formatos') {
                const tipo = document.getElementById(`tipoLinha-${itemId}`).value;
                if (tipo === 'DISPLAY') available = displayFormatos;
                else if (tipo === 'VIDEO') available = videoFormatos;
                else available = dropdownData.formatos;
            } else if (field === 'idades') { available = dropdownData.idades; }
            else if (field === 'generos') { available = dropdownData.generos; }
            else if (field === 'potencialConsumo') { available = dropdownData.potencialConsumo; }
            else if (field === 'interesses') { available = dropdownData.interesses; }
            else if (field === 'sites') { available = dropdownData.sites; }
            else if (field === 'geolocalizacao') { available = dropdownData.geolocalizacao; }
            else if (field === 'posicao') { available = dropdownData.posicao; }
            
            choiceObj.instance.setChoiceByValue(available);
            formatLineName(itemId);
        }
    }

    function deselectAll(field, itemId) {
        const choiceObj = choicesInstances.find(c => c.id === `${field}-${itemId}`);
        if (choiceObj) {
            choiceObj.instance.removeActiveItems();
            formatLineName(itemId);
        }
    }

    function formatPtBrDate(dateStr) {
        if (!dateStr) return null;
        const [year, month, day] = dateStr.split('-');
        const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        return `${day}${months[parseInt(month, 10) - 1]}${year.substring(2)}`;
    }

    function formatLineName(itemId) {
        const el = id => document.getElementById(`${id}-${itemId}`);
        if (!el('propriedade')) return;
        
        let prop = el('propriedade').value || "[Propriedade]";
        const propUpper = prop.toUpperCase();
        if (propUpper.includes("AVULSA")) prop = "MAVULSA";
        else if (propUpper.includes("APOIO")) prop = "MAPOIO";
        else if (propUpper.includes("DIVULGA")) prop = "MD";
        
        const tipoLinha = el('tipoLinha').value || "[Tipo de Linha]";
        
        let formato = "[Formato]";
        const selectFormatos = el('formatos');
        if (selectFormatos && selectFormatos.selectedOptions) {
            const selected = Array.from(selectFormatos.selectedOptions).map(o => o.value);
            if (selected.length > 0) {
                if (selected.length <= 3) formato = selected.join(",");
                else formato = "Diversos";
            }
        }
        
        let site = "[Site]";
        const selectSites = el('sites');
        if (selectSites && selectSites.selectedOptions) {
            const selected = Array.from(selectSites.selectedOptions).map(o => o.value);
            if (selected.length > 0) site = selected.join(",");
        }
        
        let geo = "[Geolocalização]";
        const selectGeo = el('geolocalizacao');
        if (selectGeo && selectGeo.selectedOptions) {
            const selected = Array.from(selectGeo.selectedOptions).map(o => {
                const match = o.value.match(/\((.*?)\)/);
                return match ? match[1] : o.value;
            });
            if (selected.length > 0) geo = selected.join(",");
        }
        
        const dInicioRaw = el('dataInicio').value;
        const dFimRaw = el('dataFim').value;
        
        const dInicio = formatPtBrDate(dInicioRaw) || "[Data Inicio]";
        const dFim = formatPtBrDate(dFimRaw) || "[Data Fim]";
        
        let nameParts = [prop, tipoLinha, formato];
        
        if (tipoLinha === "VIDEO") {
            const posVid = el('posicaoVideo').value;
            if (posVid) nameParts.push(posVid);
            
            const hasDAI = selectFormatos && Array.from(selectFormatos.selectedOptions).some(o => o.value.toUpperCase() === "DAI");
            const hasVideo = selectFormatos && Array.from(selectFormatos.selectedOptions).some(o => o.value.toUpperCase() === "VIDEO");
            
            if (!(hasDAI && !hasVideo)) {
                const skipVal = el('skip').value;
                if (skipVal) nameParts.push(skipVal);
            }
        }
        
        nameParts.push(site, geo, dInicio, dFim, itemId);
        
        const name = nameParts.filter(Boolean).join('_');
        el('lineItemName').value = name;
    }

    function calculateTotals(itemId) {
        const el = id => document.getElementById(`${id}-${itemId}`);
        const entrega = parseFloat(el('entregaDeterminada').value) || 0;
        const unitario = parseFloat(el('valorUnitario').value) || 0;
        const desconto = parseFloat(el('desconto').value) || 0;
        
        const totalTabela = (entrega / 1000) * unitario;
        el('totalTabela').value = totalTabela.toFixed(2);
        
        const totalNegociado = totalTabela - ((totalTabela * desconto) / 100);
        el('totalNegociado').value = totalNegociado.toFixed(2);
    }

        return `
            <div class="form-group ${hiddenClass}" id="fg-${id}-${itemId}">
                <label>${label}${requiredMark}</label>
                <select id="${id}-${itemId}" multiple ${requiredAttr}></select>
            </div>
        `;
    }

    function updateLineItemAddButtons() {
        const container = document.getElementById('line-items-container');
        const items = container.querySelectorAll('.line-item');

        items.forEach((item, index) => {
            const addButton = item.querySelector('.btn-add-line-item');

    function removeLineItem(idToRemove) {
        choicesInstances = choicesInstances.filter(c => {
            if (c.id.endsWith(`-${idToRemove}`)) {
                c.instance.destroy();
                return false;
            }
            return true;
        });
        document.getElementById(`line-item-container-${idToRemove}`).remove();
        reorderLines();
    }

    function reorderLines() {
        const container = document.getElementById('line-items-container');
        const items = container.querySelectorAll('.line-item');
        lineItemCount = items.length;
        
        items.forEach((item, index) => {
            const newId = index + 1;
            const oldId = parseInt(item.id.replace('line-item-container-', ''));
            item.querySelector('.line-item-title').textContent = `Linha ${newId}`;
            item.querySelector('.btn-danger').setAttribute('onclick', `removeLineItem(${newId})`);
            item.id = `line-item-container-${newId}`;
            
            const elementsWithIds = item.querySelectorAll('[id]');
            elementsWithIds.forEach(el => {
                el.id = el.id.replace(`-${oldId}`, `-${newId}`);
            });
            
            choicesInstances.forEach(c => {
                if(c.id.endsWith(`-${oldId}`)) {
                    c.id = c.id.replace(`-${oldId}`, `-${newId}`);
                }
            });
            
            formatLineName(newId);
        });

        updateLineItemAddButtons();
    }

    function getMultipleChoicesValue(id) {
        const select = document.getElementById(id);
        if (!select || !select.selectedOptions) return "";
        return Array.from(select.selectedOptions).map(o => o.value).join(", ");
    }

    function mapValues(valString, mapObj) {
        if (!valString) return "";
        return valString.split(",").map(v => {
            let key = v.trim();
            return mapObj[key] !== undefined ? mapObj[key] : key;
        }).join(", ");
    }

        ];

        let aoa = [];
        // Row 1: Campaign info (A1=Nome da Campanha, B1=Cliente, C1=Afiliadas)
        aoa.push([nomeCampanha, cliente, afiliadas]);
        // Row 2: Blank
        aoa.push([]);
        // Row 3: Headers
        aoa.push(headers);

        const container = document.getElementById('line-items-container');
        const items = container.querySelectorAll('.line-item');
        
        items.forEach((item, index) => {
            const id = index + 1;
            const el = field => document.getElementById(`${field}-${id}`) ? document.getElementById(`${field}-${id}`).value : "";
            
            const formatRaw = getMultipleChoicesValue(`formatos-${id}`);
            const isDAI = formatRaw.toUpperCase().includes("DAI");

            const formatMapped = mapValues(formatRaw, mappings.formatos);
            
            const idadeMapped = mapValues(getMultipleChoicesValue(`idades-${id}`), isDAI ? mappings.idade_audience : mappings.idade_permutive);
            const generoMapped = mapValues(getMultipleChoicesValue(`generos-${id}`), isDAI ? mappings.genero_audience : mappings.genero_permutive);
            const potencialMapped = mapValues(getMultipleChoicesValue(`potencialConsumo-${id}`), isDAI ? mappings.potencial_audience : mappings.potencial_permutive);
            const interesseMapped = mapValues(getMultipleChoicesValue(`interesses-${id}`), isDAI ? mappings.interesse_audience : mappings.interesse_permutive);

            let rowArr = [
                el('lineItemName'),
                el('propriedade'),
                el('tipoLinha'),
                formatMapped,
                el('posicaoVideo'),
                isDAI ? 'Sem Skip' : el('skip'),
                getMultipleChoicesValue(`posicao-${id}`),
                el('dataInicio'),
                el('dataFim'),
                el('entregaDeterminada'),
                el('valorUnitario'),
                el('totalTabela'),
                el('desconto'),
                el('totalNegociado'),
                getMultipleChoicesValue(`sites-${id}`),
                el('editoria'),
                getMultipleChoicesValue(`geolocalizacao-${id}`),
                getMultipleChoicesValue(`programarDisponivel-${id}`),
                el('cidades'),
                idadeMapped,
                generoMapped,
                potencialMapped,
                interesseMapped,
                el('observacoes')
            ];
            aoa.push(rowArr);
        });

        const worksheet = XLSX.utils.aoa_to_sheet(aoa);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Campanha");
        XLSX.writeFile(workbook, `Campanha_${nomeCampanha}.xlsx`);
    }
</script>
</body>
</html>
